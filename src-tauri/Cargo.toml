[package]
name = "balance-book"
version = "0.1.0"
description = "Monitor and budget personal finances"
authors = ["Zane Kissel"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[build-dependencies]
tauri-build = { version = "1", features = [] }

[dependencies]
tauri = { version = "1", features = ["shell-open"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
diesel = { version = "*", default-features = false, features = ["sqlite", "returning_clauses_for_sqlite_3_35"] }
diesel_migrations = "2.1.0"
homedir = "0.2.1"
argon2 = "0.5.3"
plaid = "8.0.0"
# for testing oauth with plaid
#tokio = { version = "1", features = ["full"] }
#axum = { version = "0.6.12", features = ["headers"] }
#oauth2 = "4.3"
#reqwest = { version = "0.11", default-features = false, features = ["rustls-tls", "json"] }
#open = "4.0.2"
uuid = "1.8.0"
dotenv = "0.15.0"
tauri-plugin-oauth = "0.0.0-alpha.0"

[features]
# This feature is used for production builds or when a dev server is not specified, DO NOT REMOVE!!
custom-protocol = ["tauri/custom-protocol"]
